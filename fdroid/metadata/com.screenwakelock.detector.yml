AutoName: Screen Wakelock Detector
Name: Screen Wakelock Detector
Summary: Find what wakes your screen—see app and channel, mute in one tap.
Description: |
  Screen Wakelock Detector logs when your phone screen turns on and shows which app
  or notification channel most likely caused it. Fix unwanted wakes in one tap—open
  that app's notification settings or mute the channel.

  All data stays on your device. No account, no cloud, no analytics. Notification
  listener access reads metadata locally to attribute wakes—not message contents.

  Optional root (Magisk, KernelSU, etc.) unlocks deeper wakelock diagnostics via an
  in-app stack—no Shizuku or extra modules required.

RequiresRoot: false
