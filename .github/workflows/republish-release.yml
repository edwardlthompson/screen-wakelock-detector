name: Republish Signed Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.2.1)"
        required: true
        default: "v1.2.1"

permissions:
  contents: write

jobs:
  republish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Grant execute permission
        run: chmod +x gradlew scripts/release/*.sh

      - name: Decode release keystore
        env:
          RELEASE_STORE_FILE_B64: ${{ secrets.RELEASE_STORE_FILE_B64 }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: bash scripts/release/decode-keystore.sh

      - name: Build signed release
        run: ./gradlew assembleRelease copyNamedReleaseApk

      - name: Verify signed APK
        env:
          EXPECT_SIGNED: ${{ secrets.RELEASE_STORE_FILE_B64 != '' && '1' || '0' }}
        run: bash scripts/release/verify-release-apk.sh

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag }}
          SKIP_BUILD: "1"
        run: bash scripts/release/publish-signed-release.sh "${{ github.event.inputs.tag }}"
