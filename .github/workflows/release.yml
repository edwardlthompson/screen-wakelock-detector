name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Grant execute permission
        run: chmod +x gradlew scripts/release/*.sh

      - name: Decode release keystore
        env:
          RELEASE_STORE_FILE_B64: ${{ secrets.RELEASE_STORE_FILE_B64 }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: bash scripts/release/decode-keystore.sh

      - name: Assemble signed release
        run: ./gradlew assembleRelease copyNamedReleaseApk

      - name: Verify release APK
        env:
          EXPECT_SIGNED: ${{ secrets.RELEASE_STORE_FILE_B64 != '' && '1' || '0' }}
        run: bash scripts/release/verify-release-apk.sh

      - name: Extract changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -n "/## \\[${VERSION}\\]/,/## \\[/p" docs/CHANGELOG.md | head -n -1 > release_notes.md || echo "See docs/CHANGELOG.md" > release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: |
            dist/Screen-Wakelock-Detector-*.apk
            app/build/outputs/mapping/release/mapping.txt
          fail_on_unmatched_files: false
