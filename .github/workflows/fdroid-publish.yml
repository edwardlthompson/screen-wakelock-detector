name: F-Droid Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  lint-and-bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint F-Droid metadata
        run: bash scripts/fdroid/lint-metadata.sh

      - name: Bump metadata from Gradle
        run: python3 scripts/fdroid/bump-metadata.py --commit "${{ github.ref_name }}"

      - uses: actions/upload-artifact@v4
        with:
          name: fdroid-metadata
          path: fdroid/metadata/com.screenwakelock.detector.yml

  assemble-release:
    runs-on: ubuntu-latest
    needs: lint-and-bump
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Assemble release
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Verify release APK
        run: |
          chmod +x scripts/release/verify-release-apk.sh
          bash scripts/release/verify-release-apk.sh

      - uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/

  reproducible-verify:
    runs-on: ubuntu-latest
    needs: assemble-release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/

      - name: Reproducible verify (when F-Droid APK available)
        run: |
          chmod +x scripts/fdroid/verify-reproducible.sh
          UP="app/build/outputs/apk/release/app-release-unsigned.apk"
          [[ -f "${UP}" ]] || UP="app/build/outputs/apk/release/app-release.apk"
          FDROID_APK=""
          for candidate in build/com.screenwakelock.detector/*/app/build/outputs/apk/*/release/*.apk .fdroid-build/*.apk; do
            if [[ -f "${candidate}" ]]; then
              FDROID_APK="${candidate}"
              break
            fi
          done
          if [[ -n "${FDROID_APK}" && -f "${UP}" ]]; then
            UPSTREAM_APK="${UP}" FDROID_APK="${FDROID_APK}" bash scripts/fdroid/verify-reproducible.sh
            date -u +"%Y-%m-%dT%H:%M:%SZ" > .fdroid-repro-verified
          else
            echo "No F-Droid builder APK in workspace — verify skipped (see docs/F-DROID.md)"
            echo "Set REQUIRE_REPRO_VERIFY=1 in GitLab fdroid pipeline when fdroid-build artifact exists"
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: repro-verify-stamp
          path: .fdroid-repro-verified
          if-no-files-found: ignore

  fdroiddata-mr:
    runs-on: ubuntu-latest
    needs: [lint-and-bump, reproducible-verify]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: fdroid-metadata
          path: fdroid/metadata/

      - name: Open fdroiddata merge request
        env:
          FDROIDDATA_FORK_URL: ${{ secrets.FDROIDDATA_FORK_URL }}
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          SKIP_REPRO_VERIFY: "1"
        run: |
          if [ -z "${FDROIDDATA_FORK_URL}" ]; then
            echo "FDROIDDATA_FORK_URL not configured — skipping MR"
            exit 0
          fi
          chmod +x scripts/fdroid/open-fdroiddata-mr.sh
          bash scripts/fdroid/open-fdroiddata-mr.sh
