name: Android CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: FOSS audit
        run: |
          FORBIDDEN="firebase|crashlytics|play-services-ads|com.google.android.gms"
          if grep -iE "${FORBIDDEN}" app/build.gradle.kts; then
            echo "Forbidden dependency detected"
            exit 1
          fi

      - name: No INTERNET permission
        run: |
          if grep -q 'android.permission.INTERNET' app/src/main/AndroidManifest.xml; then
            exit 1
          fi

      - name: No Material 2 Compose imports
        run: |
          if rg -l 'androidx\.compose\.material\.(MaterialTheme|Button|Text)' app/src/main/java --glob '*.kt'; then
            echo "Material 2 imports detected — use Material 3"
            exit 1
          fi

      - name: Exported components audit
        run: |
          EXPORTED=$(grep -c 'android:exported="true"' app/src/main/AndroidManifest.xml || true)
          echo "Exported components: ${EXPORTED}"
          grep 'android:exported="true"' app/src/main/AndroidManifest.xml
          if ! grep -q 'MainActivity' app/src/main/AndroidManifest.xml; then exit 1; fi

      - name: Lint metadata
        run: bash scripts/fdroid/lint-metadata.sh

      - name: Lint
        run: ./gradlew lint

      - name: Unit tests
        run: ./gradlew test

      - name: Assemble debug APK
        run: ./gradlew assembleDebug

      - name: Assemble release APK
        run: ./gradlew assembleRelease

      - name: Verify release APK
        run: |
          chmod +x scripts/release/verify-release-apk.sh
          bash scripts/release/verify-release-apk.sh

      - uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/
